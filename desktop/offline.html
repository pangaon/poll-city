<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poll City — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0A2342;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      text-align: center;
      padding: 40px;
    }
    h1 { font-size: 24px; font-weight: 600; }
    p { font-size: 15px; opacity: 0.7; max-width: 400px; line-height: 1.6; }
    button {
      margin-top: 8px;
      padding: 12px 28px;
      background: #1D9E75;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #18876300; filter: brightness(1.1); }
  </style>
</head>
<body>
  <h1>No internet connection</h1>
  <p>Poll City requires an internet connection to run. Check your network and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
