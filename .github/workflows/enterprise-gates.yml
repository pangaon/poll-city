name: Enterprise Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_placeholder"
          NEXTAUTH_SECRET: "ci-placeholder-secret-32chars-min"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_ROOT_DOMAIN: "poll.city"

  security-and-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security gates
        run: npm run security:gates

      - name: API contract tests
        run: npm run test:contracts
